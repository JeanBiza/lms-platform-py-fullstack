{% extends "base.html" %}

{% block title %}New Lesson — LMS Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-1">New Lesson</h2>
        <p class="text-muted mb-4">Course: {{ course.title }}</p>

        <form method="POST" action="{{ url_for('lessons.new_lesson', course_id=course.id) }}">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" name="title" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Order</label>
                <input type="number" class="form-control" name="order" min="1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Type</label>
                <select class="form-select" name="type" required>
                    <option value="">Select type...</option>
                    <option value="video">Video</option>
                    <option value="pdf">PDF</option>
                    <option value="text">Text</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea class="form-control" name="content" rows="4" required
                    placeholder="YouTube URL, PDF path, or text content..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Lesson</button>
                <a href="{{ url_for('courses.get_course', id=course.id) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
